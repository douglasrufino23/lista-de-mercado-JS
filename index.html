<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    body {
        display: flex;
        justify-content: center;
        margin: 0;
        padding: 10px;
        font-family: Arial, sans-serif;
    }

    h1 {
        text-align: center;
    }

    section {
        display: flex;
        flex-direction: column;
        align-items: center;
        background-color: aqua;
        /* No celular usa 95% da tela, no PC limita a 600px */
        width: 95%;
        max-width: 600px; 
        padding-bottom: 20px;
        border-radius: 8px;
    }

    section h2, input {
        width: 85%; /* Aumentado para ocupar melhor o espaço */
        margin: 5px 0;
    }

    h2 {
        font-size: 18px;
        font-weight: normal;
    }

    select, button {
        width: fit-content;
        padding: 5px 10px;
        cursor: pointer;
    }

    /* Container dos botões e select */
    div {
        width: 85%;
        display: flex;
        gap: 10px;
        justify-content: flex-start;
        margin-bottom: 10px;
    }

    hr {
        background-color: black;
        border: none;
        height: 1px;
        width: 100%;
    }

    #filtros {
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap; /* Faz os filtros pularem linha se não couberem */
        font-size: 15px;
        width: 100%;
        margin-bottom: 15px;
        gap: 0;
    }

    #filtros input {
        margin: 5px;
        width: 20px; /* Reduzido para não empurrar o texto */
        height: 20px;
    }

    #filtros p {
        margin: 0 10px 0 0;
    }

    table {
        width: 95%;
        border-collapse: collapse; /* Essencial para tabelas */
        
        
    }

    /* Ajuste de colunas por porcentagem para ser responsivo */
    .check {
        text-align: center;
    
    }

    .check input {
        width: 20px;
        height: 20px;
    }
   

    .item {
        width: 50%;
        word-break: break-word; /* Evita que nomes longos quebrem o layout */
        text-align: center;
    }
    

    .categoria {
        text-align: center;
        width: 30%;
        font-size: 14px;
    }

    .excluir {
        text-align: center;
        width: 10%;
    }

    .excluir button {
        background-color: #ff4d4d;
        color: white;
        border: none;
        border-radius: 4px;
        padding: 5px 8px;
    }
    
    
</style>
       
    </style>
</head>
<body>
    <section>
        <h1>Lista de Mercado</h1>
        <h2>Adicionar Item:</h2>
        <input id="input_add" type="text" placeholder="Nome do produto">
        <div>
            <select id="select_add">
                <option value="">Selecione a categoria</option>
                <option value="Mercearia">Mercearia</option>
                <option value="Proteína">Proteína</option>
                <option value="Hortifruti">Hortifruti</option>
                <option value="Limpeza">Limpeza</option>
                <option value="Outros">Outros</option>
            </select>
            <button onclick="salvar_item()">Adicionar</button>
            </div>
            <hr>
            <h2>Buscar Item:</h2>
            <input id="input_busca" type="text" placeholder="Filtre por nome">
            <div id="filtros">
                <input class="filtro" type="checkbox" value="Mercearia"><p>Mercearia</p>
                <input class="filtro" type="checkbox" value="Proteína"><p>Proteína</p>
                <input class="filtro" type="checkbox" value="Hortifruti"><p>Hortifruti</p>
                <input class="filtro" type="checkbox" value="Limpeza"><p>Limpeza</p>
                <input class="filtro" type="checkbox" value="Outros"><p>Outros</p>
            </div>
            <table>
                <thead>
                    <tr>
                        <th class="check" id="check">Check</th>
                        <th class="item">Item</th>
                        <th class="categoria">Categoria</th>
                        <th class="excluir">Excluir</th>
                    </tr>
                </thead>
                <tbody id="lista">
                </tbody>
            </table>
    </section>
            
            
        

</body>
<script>

    const input_add = document.querySelector('#input_add');
    const select_add = document.querySelector('#select_add');


    const input_busca = document.querySelector('#input_busca');
    const filtro_check = document.querySelectorAll('.filtro');
    let banco = JSON.parse(localStorage.getItem('banco')) || [];

    const lista = document.querySelector('#lista');

    
    const busca_vlr = input_busca.value.trim();

    input_busca.addEventListener('input', atualizar_lista);
    filtro_check.forEach(check => {
        check.addEventListener('change', atualizar_lista);

    });
    atualizar_lista()

    function atualizar_lista(){

        lista.innerHTML = ``

        const busca_vlr = input_busca.value.toLowerCase();

        const filtros_selecionados = Array.from(filtro_check)
        .filter(check => check.checked)
        .map(check => check.value);

        banco.forEach((item, index) => {
            const corresponde_nome = item.nome.toLowerCase().includes(busca_vlr);

            const corresponde_categoria = filtros_selecionados.length === 0 || filtros_selecionados.includes(item.categoria);
            if (corresponde_nome &&  corresponde_categoria){

                const linha = document.createElement('tr');
            

                linha.innerHTML = `
                    <td class="check" ><input  type="checkbox" ${item.checked ? 'checked': ''} onchange="alternar_check(${index})"></td>
                    <td class="item" >${item.nome}</td>
                    <td class="categoria" >${item.categoria}</td>
                    <td class="excluir" ><button onclick="excluir_item(${index})">X</button></td>`
                lista.appendChild(linha)};
                    })
                };
            
                
                       
               

        
    function salvar_item(){
        const add_vlr = input_add.value.trim();
        const select_vlr = select_add.value;
        if (add_vlr === '' || select_vlr === ''){
            alert('Favor, preencha todos os campos.');
            return;
        }
      
        const dados = {
            checked : false,
            nome : add_vlr,
            categoria : select_vlr
        };
        banco.push(dados);
        localStorage.setItem('banco', JSON.stringify(banco));

        input_add.value = ''
        select_add.value = ''
    
        atualizar_lista();
    }
    function excluir_item(index){

        banco.splice(index, 1);
        localStorage.setItem('banco', JSON.stringify(banco));

        atualizar_lista();
    }
    function alternar_check(index){
        banco[index].checked = !banco[index].checked;
        localStorage.setItem('banco', JSON.stringify(banco));
        
    }
    
</script>
</html>
